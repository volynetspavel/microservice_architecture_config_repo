eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.client.registry-fetch-interval-seconds=20
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
eureka.instance.non-secure-port=${SERVER_PORT:8084}

spring.rabbitmq.addresses=${RABBITMQ_SERVER_URL:localhost:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:admin}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:welcome}

spring.cloud.function.definition=processResourceUploaded
spring.cloud.stream.bindings.processResourceUploaded-in-0.destination=resource-uploaded
spring.cloud.stream.bindings.processResourceUploaded-in-0.group=resource-processor
spring.cloud.stream.bindings.processResourceUploaded-in-0.content-type=application/json
spring.cloud.stream.bindings.processResourceUploaded-in-0.consumer.max-attempts=3
spring.cloud.stream.bindings.processResourceUploaded-in-0.consumer.back-off-initial-interval=4000
spring.cloud.stream.bindings.processResourceUploaded-in-0.consumer.back-off-multiplier=2.0
spring.cloud.stream.bindings.processResourceUploaded-in-0.consumer.back-off-max-interval=10000
spring.cloud.stream.rabbit.bindings.processResourceUploaded-in-0.consumer.auto-bind-dlq=true
spring.cloud.stream.rabbit.bindings.processResourceUploaded-in-0.consumer.republish-to-dlq=true
spring.cloud.stream.rabbit.bindings.processResourceUploaded-in-0.consumer.dlq-ttl=60000
spring.cloud.stream.rabbit.bindings.processResourceUploaded-in-0.consumer.dlq-dead-letter-exchange=resource-uploaded
spring.cloud.stream.rabbit.bindings.processResourceUploaded-in-0.consumer.dlq-dead-letter-routing-key=resource-uploaded

# @RefreshScope demo property — change in git, commit, POST /actuator/refresh to hot-reload
processor.response.timeout-ms=5000

# Spring Cloud Stream - outbound binding for ResourceProcessedEvent (StreamBridge, no function.definition needed)
spring.cloud.stream.bindings.resource-processed-out-0.destination=resource-processed
spring.cloud.stream.bindings.resource-processed-out-0.content-type=application/json