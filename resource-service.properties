# PostgreSQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/resource-db}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Eureka Server Configuration
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
# Register as localhost so any locally-running gateway can route to this service.
# When running in Docker, EUREKA_INSTANCE_PREFER_IP_ADDRESS=true overrides this with the container IP.
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
eureka.instance.non-secure-port=${SERVER_PORT:8081}

# AWS S3 Configuration for LocalStack
aws.s3.region=us-east-1
aws.s3.endpoint=${LOCALSTACK_SERVER_URL:http://localhost:4566}
aws.s3.access-key=${LOCALSTACK_ACCESS_KEY:test}
aws.s3.secret-key=${LOCALSTACK_SECRET_KEY:test}

# RabbitMQ Configuration
spring.rabbitmq.addresses=${RABBITMQ_SERVER_URL:localhost:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:admin}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:welcome}

# Spring Cloud Stream - output binding
spring.cloud.stream.bindings.resource-uploaded-out-0.destination=resource-uploaded
spring.cloud.stream.bindings.resource-uploaded-out-0.content-type=application/json

# Spring Cloud Stream - consumer binding for STAGING → PERMANENT migration
spring.cloud.function.definition=processResourceProcessed
spring.cloud.stream.bindings.processResourceProcessed-in-0.destination=resource-processed
spring.cloud.stream.bindings.processResourceProcessed-in-0.group=resource-service
spring.cloud.stream.bindings.processResourceProcessed-in-0.content-type=application/json
spring.cloud.stream.bindings.processResourceProcessed-in-0.consumer.max-attempts=3
spring.cloud.stream.bindings.processResourceProcessed-in-0.consumer.back-off-initial-interval=2000
spring.cloud.stream.bindings.processResourceProcessed-in-0.consumer.back-off-multiplier=2.0
spring.cloud.stream.bindings.processResourceProcessed-in-0.consumer.back-off-max-interval=10000
spring.cloud.stream.rabbit.bindings.processResourceProcessed-in-0.consumer.auto-bind-dlq=true
spring.cloud.stream.rabbit.bindings.processResourceProcessed-in-0.consumer.republish-to-dlq=true
spring.cloud.stream.rabbit.bindings.processResourceProcessed-in-0.consumer.dlq-ttl=60000
spring.cloud.stream.rabbit.bindings.processResourceProcessed-in-0.consumer.dlq-dead-letter-exchange=resource-processed
spring.cloud.stream.rabbit.bindings.processResourceProcessed-in-0.consumer.dlq-dead-letter-routing-key=resource-processed

# Resilience4j Circuit Breaker — storage-service calls
resilience4j.circuitbreaker.instances.storageService.sliding-window-size=10
resilience4j.circuitbreaker.instances.storageService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.storageService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.storageService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.storageService.slow-call-duration-threshold=3s
resilience4j.circuitbreaker.instances.storageService.slow-call-rate-threshold=100

# Fallback stub values returned when storage-service is unavailable (circuit open)
# Defaults match the storage-service DataInitializer seed values
storage.fallback.staging.bucket=${LOCALSTACK_S3_STAGING_BUCKET_NAME:staging}
storage.fallback.staging.path=${STAGING_STORAGE_PATH:/songs}
storage.fallback.permanent.bucket=${LOCALSTACK_S3_PERMANENT_BUCKET_NAME:permanent}
storage.fallback.permanent.path=${PERMANENT_STORAGE_PATH:/songs}

# OAuth2 client credentials — service account for calling song-service and storage-service
spring.security.oauth2.client.registration.resource-service.client-id=resource-service-client
spring.security.oauth2.client.registration.resource-service.client-secret=${RESOURCE_SERVICE_CLIENT_SECRET}
spring.security.oauth2.client.registration.resource-service.authorization-grant-type=client_credentials
spring.security.oauth2.client.provider.resource-service.token-uri=http://auth-server:9000/oauth2/token