# PostgreSQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/storage-db}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Eureka Server Configuration
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.instance.hostname=localhost
eureka.instance.non-secure-port=${SERVER_PORT:8085}

# AWS S3 Configuration for LocalStack (used for S3 bucket creation on startup)
aws.s3.region=us-east-1
aws.s3.endpoint=${LOCALSTACK_SERVER_URL:http://localhost:4566}
aws.s3.access-key=${LOCALSTACK_ACCESS_KEY:test}
aws.s3.secret-key=${LOCALSTACK_SECRET_KEY:test}

# Storage defaults (used by DataInitializer to seed STAGING and PERMANENT records)
storage.staging.bucket=${LOCALSTACK_S3_STAGING_BUCKET_NAME:staging}
storage.staging.path=${STAGING_STORAGE_PATH:/songs}
storage.permanent.bucket=${LOCALSTACK_S3_PERMANENT_BUCKET_NAME:permanent}
storage.permanent.path=${PERMANENT_STORAGE_PATH:/songs}
