spring.cloud.gateway.routes[0].id=resource-service
spring.cloud.gateway.routes[0].uri=lb://resource-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/resources/**
spring.cloud.gateway.routes[0].filters[0]=TokenRelay=

spring.cloud.gateway.routes[1].id=song-service
spring.cloud.gateway.routes[1].uri=lb://song-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/songs/**
spring.cloud.gateway.routes[1].filters[0]=TokenRelay=

spring.cloud.gateway.routes[2].id=resource-processor
spring.cloud.gateway.routes[2].uri=lb://resource-processor
spring.cloud.gateway.routes[2].predicates[0]=Path=/processor/**

spring.cloud.gateway.routes[3].id=storage-service
spring.cloud.gateway.routes[3].uri=lb://storage-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/storages/**
spring.cloud.gateway.routes[3].filters[0]=TokenRelay=

spring.cloud.gateway.routes[4].id=resource-service-actuator
spring.cloud.gateway.routes[4].uri=lb://resource-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/actuator/**

eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

# OAuth2 client registration — required by TokenRelay filter infrastructure
spring.security.oauth2.client.registration.gateway.client-id=user-client
spring.security.oauth2.client.registration.gateway.client-secret=${GATEWAY_CLIENT_SECRET}
spring.security.oauth2.client.registration.gateway.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.gateway.scope=openid
spring.security.oauth2.client.provider.gateway.issuer-uri=http://auth-server:9000