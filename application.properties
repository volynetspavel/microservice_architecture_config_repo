# Actuator — exposed on all client services
management.endpoints.web.exposure.include=health,refresh,env,prometheus
management.endpoint.health.show-details=always

# Enable histogram buckets for HTTP server requests (required for histogram_quantile in Prometheus/Grafana)
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# Structured JSON logging (ECS format) — picked up by Filebeat → Elasticsearch
logging.structured.format.console=ecs

# Distributed tracing — sample every request (lower in production)
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_SERVER_URL:http://localhost:9411/api/v2/spans}
# Propagate trace context through RabbitMQ message headers (Spring Cloud Stream 4.x)
spring.cloud.stream.default.observation-enabled=true